[build]
publish = "."
functions = "netlify/functions"

[[redirects]]
from = "/api/shopee"
to = "/.netlify/functions/shopee"
status = 200

[[redirects]]
from = "/api/config"
to = "/.netlify/functions/config"
status = 200

[[redirects]]
from = "/api/sync"
to = "/.netlify/functions/sync"
status = 200

[[redirects]]
from = "/api/query"
to = "/.netlify/functions/query"
status = 200

[[redirects]]
from = "/api/comissao"
to = "/.netlify/functions/comissao"
status = 200

# Roda sozinho 4x/dia (8h, 12h, 16h, 20h em Brasília = 11h, 15h, 19h, 23h UTC).
# Netlify Scheduled Functions rodam sempre em UTC.
[functions."comissao-scheduled"]
schedule = "0 11,15,19,23 * * *"

[build.environment]
SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

